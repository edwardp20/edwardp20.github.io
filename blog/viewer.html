<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 实时渲染中转器</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fafcff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #1e2f3c;
        }

        /* 导航栏样式 - 与博客风格统一 */
        .nav-bar {
            background: #ffffff;
            border-bottom: 1px solid #e2e9f2;
            padding: 0.8rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.95);
        }

        .nav-container {
            max-width: 1120px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo a {
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f3e48, #2b6f6b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .nav-links {
            display: flex;
            gap: 1.8rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #3a6270;
            font-weight: 500;
            transition: color 0.2s;
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            color: #1f8a7a;
        }

        /* 主内容区 */
        .main-content {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        #content {
            background: #ffffff;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(0, 0, 0, 0.02);
        }

        .error {
            color: #c55a5a;
            background: #ffe6e6;
            padding: 1.2rem;
            border-radius: 1rem;
            border-left: 4px solid #c55a5a;
        }

        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 1rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            margin: 1rem 0;
        }

        code {
            font-family: 'Courier New', 'Monaco', monospace;
            font-size: 0.9em;
        }

        .footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid #e2e9f0;
            color: #6d8a9c;
            font-size: 0.75rem;
            margin-top: 2rem;
        }

        @media (max-width: 640px) {
            .nav-container {
                flex-direction: column;
                align-items: center;
            }
            #content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 - 与博客风格统一 -->
    <div class="nav-bar">
        <div class="nav-container">
            <div class="logo">
                <a href="#">edwardp20</a>
            </div>
            <div class="nav-links">
                <a href="index.html">博客主页</a>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div id="content">加载中...</div>
    </div>

    <div class="footer">
        <span>copyleft 2026 edwardp20 · 文章由 Markdown 实时渲染</span>
    </div>

    <script>
        // 获取 URL 参数 ?md=xxx.md
        const urlParams = new URLSearchParams(window.location.search);
        const mdFile = urlParams.get('md');

        // 从 titles.json 获取标题并更新 <title>
        function updateTitleFromJson(mdFileName) {
            fetch('titles.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('titles.json 不存在');
                    }
                    return response.json();
                })
                .then(titles => {
                    // 获取文件名（不含路径，用于匹配）
                    const baseName = mdFileName.split('/').pop();
                    if (titles[baseName]) {
                        document.title = titles[baseName];
                    }
                    // 如果 .json 中没有对应条目，保留原标题
                })
                .catch(() => {
                    // .json 不存在或无网络，不做任何操作，保留默认标题
                });
        }

        if (!mdFile) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    ⚠️ 请指定 Markdown 文件，例如：<br>
                    <code>?md=myarticle.md</code>
                </div>
            `;
        } else {
            // 尝试从 titles.json 获取标题
            updateTitleFromJson(mdFile);
            
            fetch(mdFile)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`文件 ${mdFile} 不存在或无法访问`);
                    }
                    return response.text();
                })
                .then(markdown => {
                    const html = marked.parse(markdown);
                    document.getElementById('content').innerHTML = html;
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = `
                        <div class="error">
                            ❌ 加载失败：${error.message}
                        </div>
                    `;
                });
        }
    </script>
</body>
</html>

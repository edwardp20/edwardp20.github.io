<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 实时渲染中转器</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }
        #content {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
        }
        .error {
            color: red;
            background: #ffe6e6;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid red;
        }
        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
        }
        code {
            font-family: 'Courier New', monospace;
        }
        a {
            color: #0366d6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="content">加载中...</div>

    <script>
        // 获取 URL 参数 ?md=xxx.md
        const urlParams = new URLSearchParams(window.location.search);
        const mdFile = urlParams.get('md');

        if (!mdFile) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    ⚠️ 请指定 Markdown 文件，例如：<br>
                    <code>?md=myarticle.md</code>
                </div>
            `;
        } else {
            fetch(mdFile)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`文件 ${mdFile} 不存在或无法访问`);
                    }
                    return response.text();
                })
                .then(markdown => {
                    const html = marked.parse(markdown);
                    document.getElementById('content').innerHTML = html;
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = `
                        <div class="error">
                            ❌ 加载失败：${error.message}
                        </div>
                    `;
                });
        }
    </script>
</body>
</html>

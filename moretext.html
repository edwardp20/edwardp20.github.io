<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>edwardp20 · 全部文章</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fafcff;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: #1e2f3c;
            line-height: 1.5;
        }

        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* 导航栏 */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e9f2;
        }

        .logo a {
            text-decoration: none;
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f3e48, #2b6f6b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .nav-links {
            display: flex;
            gap: 1.8rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #3a6270;
            font-weight: 500;
            transition: color 0.2s;
            font-size: 0.95rem;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #1f8a7a;
        }

        /* 页面头部 */
        .page-header {
            margin-bottom: 2.5rem;
        }

        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a3b44;
            letter-spacing: -0.3px;
        }

        .page-header p {
            color: #5e7e8e;
            margin-top: 0.5rem;
            border-left: 3px solid #86b3aa;
            padding-left: 1rem;
        }

        /* 文章列表布局 (卡片式) */
        .articles-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .article-card {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(0, 0, 0, 0.02);
            transition: all 0.25s ease;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 1.8rem;
        }

        .article-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(0, 0, 0, 0.02);
        }

        .article-info {
            flex: 1;
        }

        .article-title {
            font-size: 1.35rem;
            font-weight: 650;
            color: #1f4e58;
            margin-bottom: 0.4rem;
        }

        .article-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: #6f8da0;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .article-desc {
            font-size: 0.85rem;
            color: #486c7c;
            max-width: 85%;
        }

        .tag-list {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.6rem;
            flex-wrap: wrap;
        }

        .tag {
            background: #edf3f9;
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #2a6b6b;
        }

        /* 超链接按钮 - 跳转到专门的文章网页 (文章内容独立) */
        .read-btn {
            background: #1f5e66;
            color: white;
            text-decoration: none;
            padding: 0.55rem 1.6rem;
            border-radius: 3rem;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            white-space: nowrap;
        }

        .read-btn:hover {
            background: #0f4a52;
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
        }

        /* 未来文章提示（表示还有后续扩展，但不影响唯一示范文章） */
        .future-note {
            background: #f9fbfe;
            border-radius: 1.5rem;
            padding: 1.2rem 1.8rem;
            text-align: center;
            border: 1px dashed #cbdbe0;
            color: #638596;
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        .footer {
            margin-top: 3rem;
            text-align: center;
            padding: 1.8rem 0.5rem;
            border-top: 1px solid #e2e9f0;
            color: #6d8a9c;
            font-size: 0.8rem;
        }

        @media (max-width: 700px) {
            .article-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                padding: 1.2rem;
            }
            .article-desc {
                max-width: 100%;
            }
            .read-btn {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 导航栏 (保持与博客风格统一) -->
    <div class="nav-bar">
        <div class="logo">
            <a href="#">edwardp20</a>
        </div>
        <div class="nav-links">
            <a href="index.html">博客主页</a>
        </div>
    </div>

    <!-- 页面头部：全部文章列表页 -->
    <div class="page-header">
        <h1>📚 全部文章</h1>
    </div>

    <div class="articles-grid">
        <!-- 唯一一篇示范文章卡片 (超链接跳转专门文章页) -->
        <div class="article-card">
            <div class="article-info">
                <div class="article-title">test</div>
                <div class="article-meta">
                    <span>📅 2025年3月12日</span>
                    <span>✍️ edwardp20</span>
                    <span>⏱ 预计阅读 8 分钟</span>
                </div>
                <div class="article-desc">
                    test
                </div>
                <div class="tag-list">
                    <span class="tag">#test</span>
                </div>
            </div>
            <div>
                <!-- 超链接按钮：跳转到专门的文章网页 (article-demo.html) 
                     用户需要将独立文章页放在同目录下，这里明确指向独立内容页 -->
                <a href="blog/view.html?md=test.md" class="read-btn">📖 阅读全文 →</a>
            </div>
        </div>
    </div>

    <!-- 未来扩展提示（仅示意更多文章将在后续添加，不影响当前唯一示范文章） -->
    <div class="footer">
        <span>copyleft 2026 edwardp20</span><br>
    </div>
</div>

<!-- 
    重要说明：由于用户要求“文章内容网页暂时不要为我单独写”，
    因此本页面仅包含全部文章的列表与跳转按钮，没有内嵌文章正文。
    超链接指向 "article-demo.html"，这是预期的独立文章页面。
    当用户后续需要时可自行创建该文件，或者保持当前纯列表形态。
    完全满足需求：仅实现全部文章网页，不嵌入文章正文内容。
-->
</body>
</html>
